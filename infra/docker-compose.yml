# Freddy Infrastructure - Docker Compose
# Development environment setup

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: freddy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: freddy
      POSTGRES_USER: freddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freddy_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freddy"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: freddy-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # For GPU support, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  seq:
    image: datalust/seq:latest
    container_name: freddy-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"   # Ingestion
      - "8081:80"     # UI
    volumes:
      - seq_data:/data

  # Nginx serves the React static build and proxies /api to the ASP.NET Core API.
  # In production, use a multi-stage Docker build:
  #   Stage 1: node:22-alpine  → npm ci && npm run build
  #   Stage 2: nginx:alpine    → copy dist/ to /usr/share/nginx/html
  nginx:
    image: nginx:alpine
    container_name: freddy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      # In dev, mount the React build output:
      # - ../apps/Freddy.Web/dist:/usr/share/nginx/html:ro
    depends_on:
      - seq

volumes:
  postgres_data:
  ollama_data:
  seq_data:
